experiment_name: "Prithvi EO V2 600M"
data_version: "v0.50.1"
chip_tracker: "gelos_chip_tracker.geojson"
chip_id_column: "id"

seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  callbacks: []
  max_epochs: 0

data:
  class_path: gelos.gelosdatamodule.GELOSDataModule
  init_args:
    dataset_class: src.gelosdataset_lc.GELOSLCDataSet
    batch_size: 1
    num_workers: 0
    bands:
      S2L2A:
        - BLUE
        - GREEN
        - RED
        - NIR_NARROW
        - SWIR_1
        - SWIR_2
    transform:
      - class_path: terratorch.datasets.transforms.FlattenTemporalIntoChannels
      - class_path: albumentations.PadIfNeeded
        init_args:
          min_height: 98
          min_width: 98
      - class_path: albumentations.pytorch.transforms.ToTensorV2
      - class_path: terratorch.datasets.transforms.UnflattenTemporalFromChannels
        init_args:
          n_timesteps: 4

model:
  class_path: terratorch.tasks.EmbeddingGenerationTask
  title: Prithvi EO V2 600M
  init_args:
    model: prithvi_eo_v2_600
    model_args:
      bands:
        - BLUE
        - GREEN
        - RED
        - NIR_NARROW
        - SWIR_1
        - SWIR_2
      pretrained: true
    output_format: parquet
    embed_file_key: filename
    layers: [-1] # Model layers to extract embeddings from, -1 means the last layer
    embedding_pooling: null
    has_cls: True

# define embedding extraction strategy names and lists of arguments for the embedding extraction function
embedding_extraction_strategies:
  cls_token:
    title: "CLS Token"
    slice_args:
    - start: 0
      stop: 1
      step: 1
    transforms:
      - type: tsne
    plots:
      - type: tsne_scatter
        transform: tsne
  all_steps_of_middle_patch:
 # as the first patch is the cls token, we index the middle as 25 rather than 24.
 # this is important for consistency with non-cls token models like terramind.
    title: "All Steps of Middle Patch"
    slice_args:
    - start: 25
      stop: null
      # start and step are determined by the patch H and W dimensions determined by the model and the input sizes.
      # in this case, as our inputs are 96x96 and prithvi eo 600m uses 14x14 patches,
      # inputs are padded to 98x98 and we have 7x7 or 49 patches per time step.
      step: 49
    transforms:
      - type: tsne
    plots:
      - type: tsne_scatter
        transform: tsne
  all_patches_from_april_to_june:
    title: "All Patches from April to June"
    slice_args:
    - start: 50
      stop: 99
      step: 1
    transforms:
      - type: tsne
    plots:
      - type: tsne_scatter
        transform: tsne

style:
  category_column: "lulc"
  colors:
    "1": "#419bdf"    # Water
    "2": "#397d49"    # Trees
    "5": "#e49635"    # Crops
    "7": "#c4281b"    # Built Area
    "8": "#a59b8f"    # Bare Ground
    "11": "#e3e2c3"   # Rangeland
  labels:
    "1": "Water"
    "2": "Trees"
    "5": "Crops"
    "7": "Built Area"
    "8": "Bare Ground"
    "11": "Rangeland"
