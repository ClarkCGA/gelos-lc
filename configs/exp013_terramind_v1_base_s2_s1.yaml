experiment_name: "Terramind V1 Base S2 + S1"
data_version: "v0.50.1"
chip_tracker: "gelos_chip_tracker.geojson"
chip_id_column: "id"

seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  callbacks: []
  max_epochs: 0

data:
  class_path: gelos.gelosdatamodule.GELOSDataModule
  init_args:
    dataset_class: src.gelosdataset_lc.GELOSLCDataSet
    batch_size: 1
    num_workers: 0
    bands:
      S2L2A:
      - COASTAL_AEROSOL
      - BLUE
      - GREEN
      - RED
      - RED_EDGE_1
      - RED_EDGE_2
      - RED_EDGE_3
      - NIR_BROAD
      - NIR_NARROW
      - WATER_VAPOR
      - SWIR_1
      - SWIR_2
      S1RTC:
      - VV
      - VH
    transform:
      - class_path: terratorch.datasets.transforms.FlattenTemporalIntoChannels
      - class_path: albumentations.augmentations.geometric.resize.Resize
        init_args:
          height: 96
          width: 96
          interpolation: 0 # Nearest Neighbor
      - class_path: albumentations.pytorch.transforms.ToTensorV2
      - class_path: terratorch.datasets.transforms.UnflattenTemporalFromChannels
        init_args:
          n_timesteps: 4

model:
  class_path: terratorch.tasks.EmbeddingGenerationTask
  title: Terramind V1 Base
  init_args:
    model: terramind_v1_base
    model_args:
      modalities:
        - S2L2A
        - S1RTC
      merge_method: mean
      pretrained: True
    output_format: parquet
    embed_file_key: filename
    layers: [-1] # Model layers to extract embeddings from, -1 means the last layer
    embedding_pooling: null
    has_cls: False
    temporal_cfg:
      temporal_wrapper: True
      temporal_pooling: keep

# define embedding extraction strategy names and lists of arguments for the embedding extraction function
embedding_extraction_strategies:
  # since terramind embeddings are nested lists, the first args dict gets all time steps, the second gets patch at idx 18 (center)
  all_steps_of_middle_patch:
    title: "All Steps of Middle Patch"
    slice_args:
    - start: 0
      stop: null
      step: 1
    - start: 14
      stop: 15
      step: 1
    transforms:
      - type: tsne
      - type: umap
    plots:
      - type: scatter_2d
        transform: tsne
        params:
          axis_lim: 160
      - type: scatter_2d
        transform: umap
        params:
          axis_lim: ~
      - type: temporal_cosine_similarity
        transform: raw
        params:
          n_timesteps: 4                                                                                                                               
          timestep_labels: ["Jan-Mar", "Apr-Jun", "Jul-Sep", "Oct-Dec"]
  all_patches_from_april_to_june:
    title: "All Patches from April to June"
    slice_args:
    - start: 1
      stop: 2
      step: 1
    transforms:
      - type: tsne
      - type: umap
    plots:
      - type: scatter_2d
        transform: tsne
        params:
          axis_lim: 160
      - type: scatter_2d
        transform: umap
        params:
          axis_lim: ~

style:
  category_column: "lulc"
  colors:
    "1": "#419bdf"    # Water
    "2": "#397d49"    # Trees
    "5": "#e49635"    # Crops
    "7": "#c4281b"    # Built Area
    "8": "#a59b8f"    # Bare Ground
    "11": "#e3e2c3"   # Rangeland
  labels:
    "1": "Water"
    "2": "Trees"
    "5": "Crops"
    "7": "Built Area"
    "8": "Bare Ground"
    "11": "Rangeland"
