comparison_name: "PCA Ablation Comparison (All Experiments)"

experiments:
  # --- Prithvi EO V2 300M ---
  - data_version: "v0.50.1"
    config: "exp001_prithvi300"
    strategy: "cls_token"
    layer: "layer_23"
    label: "Prithvi 300M | CLS Token"
  - data_version: "v0.50.1"
    config: "exp001_prithvi300"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_23"
    label: "Prithvi 300M | Middle Patch (4 steps)"
  - data_version: "v0.50.1"
    config: "exp001_prithvi300"
    strategy: "four_patches_from_april_to_june"
    layer: "layer_23"
    label: "Prithvi 300M | 4 Patches (Apr-Jun)"

  # --- Prithvi EO V2 600M ---
  - data_version: "v0.50.1"
    config: "exp004_prithvi600"
    strategy: "cls_token"
    layer: "layer_31"
    label: "Prithvi 600M | CLS Token"
  - data_version: "v0.50.1"
    config: "exp004_prithvi600"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_31"
    label: "Prithvi 600M | Middle Patch (4 steps)"
  - data_version: "v0.50.1"
    config: "exp004_prithvi600"
    strategy: "four_patches_from_april_to_june"
    layer: "layer_31"
    label: "Prithvi 600M | 4 Patches (Apr-Jun)"

  # --- Terramind V1 Base ---
  - data_version: "v0.50.1"
    config: "exp007_terramind_v1_base"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_11"
    label: "Terramind Base | Middle Patch (4 steps)"
  - data_version: "v0.50.1"
    config: "exp007_terramind_v1_base"
    strategy: "four_patches_from_april_to_june"
    layer: "layer_11"
    label: "Terramind Base | 4 Patches (Apr-Jun)"

  # --- Terramind V1 Large ---
  - data_version: "v0.50.1"
    config: "exp010_terramind_v1_large"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_23"
    label: "Terramind Large | Middle Patch (4 steps)"
  - data_version: "v0.50.1"
    config: "exp010_terramind_v1_large"
    strategy: "four_patches_from_april_to_june"
    layer: "layer_23"
    label: "Terramind Large | 4 Patches (Apr-Jun)"

  # --- Sensor ablations ---
  - data_version: "v0.50.1"
    config: "exp011_terramind_v1_base_s2_only"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_11"
    label: "Terramind Base S2 Only | Middle Patch (4 steps)"
  - data_version: "v0.50.1"
    config: "exp011_terramind_v1_base_s2_only"
    strategy: "four_patches_from_april_to_june"
    layer: "layer_11"
    label: "Terramind Base S2 Only | 4 Patches (Apr-Jun)"
  - data_version: "v0.50.1"
    config: "exp012_terramind_v1_large_s2_only"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_23"
    label: "Terramind Large S2 Only | Middle Patch (4 steps)"
  - data_version: "v0.50.1"
    config: "exp012_terramind_v1_large_s2_only"
    strategy: "four_patches_from_april_to_june"
    layer: "layer_23"
    label: "Terramind Large S2 Only | 4 Patches (Apr-Jun)"
  - data_version: "v0.50.1"
    config: "exp013_terramind_v1_base_s2_s1"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_11"
    label: "Terramind Base S2+S1 | Middle Patch (4 steps)"
  - data_version: "v0.50.1"
    config: "exp013_terramind_v1_base_s2_s1"
    strategy: "four_patches_from_april_to_june"
    layer: "layer_11"
    label: "Terramind Base S2+S1 | 4 Patches (Apr-Jun)"
  - data_version: "v0.50.1"
    config: "exp014_terramind_v1_large_s2_s1"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_23"
    label: "Terramind Large S2+S1 | Middle Patch (4 steps)"
  - data_version: "v0.50.1"
    config: "exp014_terramind_v1_large_s2_s1"
    strategy: "four_patches_from_april_to_june"
    layer: "layer_23"
    label: "Terramind Large S2+S1 | 4 Patches (Apr-Jun)"

comp_metrics:
  - type: pca_ablation_comparison

comp_plots:
  - type: pca_ablation_table
    metric: pca_ablation_comparison
