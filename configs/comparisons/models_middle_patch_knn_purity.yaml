comparison_name: "KNN Purity — Models @ Middle Patch (4 steps)"

class_labels:
  "1": "Water"
  "2": "Trees"
  "5": "Crops"
  "7": "Built Area"
  "8": "Bare Ground"
  "11": "Rangeland"

experiments:
  - data_version: "v0.50.1"
    config: "exp001_prithvi300"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_23"
    label: "Prithvi 300M"
  - data_version: "v0.50.1"
    config: "exp004_prithvi600"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_31"
    label: "Prithvi 600M"
  - data_version: "v0.50.1"
    config: "exp007_terramind_v1_base"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_11"
    label: "Terramind Base"
  - data_version: "v0.50.1"
    config: "exp010_terramind_v1_large"
    strategy: "all_steps_of_middle_patch"
    layer: "layer_23"
    label: "Terramind Large"

comp_metrics:
  - type: knn_purity_comparison

comp_plots:
  - type: knn_purity_plot
    metric: knn_purity_comparison
